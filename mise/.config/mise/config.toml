[tools]
node = "latest"
pnpm = "latest"
python = "3.13.3"
uv = "latest"

# --- AI Tools (Example based) ---
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:czg" = "latest"

# --- Recommended TUI Utils ---
neovim = "latest"
lazygit = "latest"
ripgrep = "latest"
fd = "latest"
fzf = "latest"
starship = "latest"
yazi = "latest"
"aqua:rossmacarthur/sheldon" = "latest"
zoxide = "latest"
deno = "latest"
eza = "latest"
bat = "latest"

[settings]
experimental = true
asdf_compat = true
idiomatic_version_file_enable_tools = ["node"]

[env]
# --- Editor Settings ---
EDITOR = "nvim"
VISUAL = "nvim"

# --- Common CLI Tools Settings ---
# AWS CLI の出力を WezTerm のスクロールバックに直接流す (ページャー無効化)
AWS_PAGER = ""
# bat 等のシンタックスハイライトテーマを固定
BAT_THEME = "TwoDark"

# --- Locale & i18n ---
# C.UTF-8 はモダンな Linux で必ず利用できる、英語ベースかつ Unicode 対応の安全なロケールです
LANG = "C.UTF-8"
LC_ALL = "C.UTF-8"

[tasks]
# --- Maintenance ---
# 全ツールの更新を一括実行
update = { run = "mise self-update && mise upgrade && sudo apt update && sudo apt upgrade -y", description = "Update all tools via mise and apt" }

# --- Shortcut Commands ---
# どこにいてもドットファイルのリポジトリで Lazygit を起動
dot = { run = "cd ~/dotfiles && lazygit", description = "Management dotfiles repo with lazygit" }
# WezTerm の設定を即座に開く
wez = { run = "nvim ~/dotfiles/wezterm/.config/wezterm/wezterm.lua", description = "Edit WezTerm config" }
# mise の設定を即座に開く
config = { run = "nvim ~/dotfiles/mise/.config/mise/config.toml", description = "Edit global mise config" }

# --- External Tool Bridges ---
# Claude Code をプロジェクトディレクトリ等で起動する例
ai = { run = "claude", description = "Launch Claude Code AI assistant" }
