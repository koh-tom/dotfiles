[tools]
# --- Core Languages (Example based) ---
node = "latest"
pnpm = "latest"
python = "3.13.3"
uv = "latest"

# --- AI Tools (Example based) ---
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:czg" = "latest"

# --- Recommended TUI Utils (Phase 1 & 2 integration) ---
neovim = "latest"
lazygit = "latest"
ripgrep = "latest"
fd = "latest"
fzf = "latest"
starship = "latest"
yazi = "latest"

# --- WezTerm Module Support ---
#"pipx:plamo-translate" = { version = "latest", uvx = "true" }

[settings]
idiomatic_version_file_enable_tools = ["node"]

[env]
# --- Editor Settings ---
EDITOR = "nvim"
VISUAL = "nvim"

# --- Common CLI Tools Settings ---
# AWS CLI の出力を WezTerm のスクロールバックに直接流す (ページャー無効化)
AWS_PAGER = ""
# bat 等のシンタックスハイライトテーマを固定 (後の Phase で導入予定)
BAT_THEME = "TwoDark"

# --- Locale & i18n ---
# C.UTF-8 はモダンな Linux で必ず利用できる、英語ベースかつ Unicode 対応の安全なロケールです
LANG = "C.UTF-8"
LC_ALL = "C.UTF-8"

[tasks]
# mise run update
update = "mise self-update && mise upgrade && apt update"
# mise run dot
dot = "cd ~/dotfiles && lazygit"
